# nginx config for serving the built Accounts remote.
#
# Two responsibilities:
#  1. Serve remoteEntry.js (and federated chunks) with PERMISSIVE CORS so the shell, served
#     from a different origin, can fetch the Module Federation entry.
#  2. SPA fallback so the remote also runs standalone (its client-side routes resolve).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- CORS for the federation entry + all hashed JS/CSS chunks ---------------
    # The shell fetches these cross-origin. We allow any origin for the static assets
    # (they contain no secrets — auth happens via the gateway with a Bearer token).
    location ~* \.(js|mjs|css|json|map)$ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        # remoteEntry.js must never be stale-cached aggressively; the shell relies on the
        # current manifest. Hashed chunks can cache long; remoteEntry should revalidate.
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # Answer CORS preflight quickly.
    location = /assets/remoteEntry.js {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # --- SPA fallback for standalone mode --------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
